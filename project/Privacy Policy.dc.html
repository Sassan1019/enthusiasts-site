<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #0A0B0F; }
  a { color: #9FC2E8; }
  a:hover { color: #E8EAEF; }
</style>
</helmet>

<div style="min-height:100vh; background:#0A0B0F; color:#E8EAEF; font-family:'Noto Sans JP',sans-serif">
  <header style="display:flex; align-items:center; justify-content:space-between; padding:24px 6vw; border-bottom:1px solid rgba(232,234,239,0.1); position:sticky; top:0; background:rgba(10,11,15,0.82); backdrop-filter:blur(12px); z-index:10">
    <a href="ENTHUSIASTS%20v3.dc.html" style="font-family:'Archivo','Noto Sans JP',sans-serif; font-weight:800; font-size:16px; letter-spacing:0.16em; color:#E8EAEF; text-decoration:none">ENTHUSIASTS</a>
    <a href="ENTHUSIASTS%20v3.dc.html" style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:10.5px; letter-spacing:0.22em; color:rgba(232,234,239,0.55); text-decoration:none" style-hover="color:#E8EAEF">← BACK TO HOME</a>
  </header>

  <main style="max-width:820px; margin:0 auto; padding:clamp(72px,10vw,132px) 6vw clamp(96px,12vw,160px)">
    <div style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:11px; letter-spacing:0.3em; color:#5C82BE; margin-bottom:20px">PRIVACY POLICY</div>
    <h1 style="font-family:'Archivo','Noto Sans JP',sans-serif; font-weight:800; font-size:clamp(30px,4.6vw,56px); letter-spacing:0.02em; line-height:1.15; margin:0 0 16px">プライバシーポリシー</h1>
    <p style="margin:0 0 clamp(48px,7vw,80px); font-size:14px; line-height:2.2; color:rgba(232,234,239,0.55); max-width:640px; text-wrap:pretty">ENTHUSIASTS（以下「当団体」といいます）は、お問い合わせ等を通じて取得する個人情報の重要性を認識し、以下の方針に基づき適切に取り扱います。</p>

    <div style="display:flex; flex-direction:column; gap:clamp(40px,5.5vw,60px)">
      <sc-for list="{{ sections }}" as="s" hint-placeholder-count="8">
        <section style="border-top:1px solid rgba(232,234,239,0.12); padding-top:clamp(24px,3vw,34px)">
          <div style="display:flex; gap:18px; align-items:baseline; margin-bottom:clamp(14px,1.8vw,20px)">
            <span style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:13px; letter-spacing:0.12em; color:#5C82BE; flex:0 0 auto">{{ s.num }}</span>
            <h2 style="font-family:'Archivo','Noto Sans JP',sans-serif; font-weight:700; font-size:clamp(18px,2.2vw,24px); letter-spacing:0.02em; line-height:1.5; margin:0; color:#E8EAEF">{{ s.title }}</h2>
          </div>
          <div style="padding-left:0">
            <sc-for list="{{ s.paras }}" as="p" hint-placeholder-count="1">
              <p style="margin:0 0 1.4em; font-size:14.5px; line-height:2.15; color:rgba(232,234,239,0.7); text-wrap:pretty">{{ p }}</p>
            </sc-for>
          </div>
        </section>
      </sc-for>
    </div>

    <div style="margin-top:clamp(56px,8vw,88px); padding:clamp(28px,4vw,44px); border:1px solid rgba(232,234,239,0.12); background:linear-gradient(180deg, rgba(19,22,30,0.55), rgba(13,15,21,0.55))">
      <div style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:11px; letter-spacing:0.2em; color:rgba(232,234,239,0.5); margin-bottom:12px">お問い合わせ窓口</div>
      <p style="margin:0; font-size:14.5px; line-height:2.1; color:rgba(232,234,239,0.7)">個人情報の取扱いに関するお問い合わせは、下記までご連絡ください。<br><a href="mailto:satokichi1019@gmail.com" style="color:#9FC2E8; text-decoration:underline; text-underline-offset:3px">satokichi1019@gmail.com</a></p>
    </div>

    <div style="margin-top:clamp(40px,5vw,56px); font-size:13px; color:rgba(232,234,239,0.4)">制定日：2026年7月7日</div>
  </main>

  <footer style="border-top:1px solid rgba(232,234,239,0.1); padding:34px 6vw; display:flex; flex-wrap:wrap; gap:16px 40px; align-items:center; justify-content:space-between">
    <a href="ENTHUSIASTS%20v3.dc.html" style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:11px; letter-spacing:0.28em; color:rgba(232,234,239,0.45); text-decoration:none" style-hover="color:#E8EAEF">ENTHUSIASTS</a>
    <div style="font-family:'Archivo','Noto Sans JP',sans-serif; font-size:10px; letter-spacing:0.18em; color:rgba(232,234,239,0.3)">© 2026 ENTHUSIASTS</div>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      sections: [
        {
          num: "01",
          title: "個人情報の定義",
          paras: [
            "本ポリシーにおいて「個人情報」とは、個人情報の保護に関する法律に定める個人情報、すなわち生存する個人に関する情報であって、氏名、メールアドレス等により特定の個人を識別できるもの（他の情報と容易に照合でき、それにより特定の個人を識別できるものを含みます）を指します。"
          ]
        },
        {
          num: "02",
          title: "個人情報の取得",
          paras: [
            "当団体は、お問い合わせフォームの送信、その他適法かつ公正な手段によって、利用目的の達成に必要な範囲で個人情報を取得します。",
            "お問い合わせの際には、お名前・メールアドレス・会社名または所属・お問い合わせ内容などをご入力いただく場合があります。"
          ]
        },
        {
          num: "03",
          title: "利用目的",
          paras: [
            "取得した個人情報は、以下の目的の範囲内で利用します。",
            "・お問い合わせへの回答およびご連絡のため／・プロジェクトへの参加、協業、取材等のご相談に関する対応のため／・当団体の活動に関するご案内のため／・上記に付随する業務の遂行のため。"
          ]
        },
        {
          num: "04",
          title: "第三者への提供",
          paras: [
            "当団体は、法令に定める場合を除き、あらかじめご本人の同意を得ることなく、取得した個人情報を第三者に提供しません。",
            "ただし、人の生命・身体または財産の保護のために必要があり、ご本人の同意を得ることが困難である場合等、法令で認められる場合はこの限りではありません。"
          ]
        },
        {
          num: "05",
          title: "安全管理措置",
          paras: [
            "当団体は、取り扱う個人情報の漏えい、滅失またはき損の防止その他の安全管理のために、必要かつ適切な措置を講じます。"
          ]
        },
        {
          num: "06",
          title: "開示・訂正・利用停止等",
          paras: [
            "ご本人から、ご自身の個人情報について開示、訂正、追加、削除、利用停止または消去のご請求があった場合、当団体は法令に基づき、ご本人であることを確認のうえ、合理的な期間内に対応します。",
            "ご請求は、末尾のお問い合わせ窓口までご連絡ください。"
          ]
        },
        {
          num: "07",
          title: "Cookie等の利用",
          paras: [
            "本サイトでは、利用状況の把握やサービス向上のため、Cookieや類似技術を利用する場合があります。これらは個人を直接特定するものではなく、ブラウザの設定により無効化することが可能です。"
          ]
        },
        {
          num: "08",
          title: "本ポリシーの改定",
          paras: [
            "当団体は、法令の改正や運用の変更等に応じて、本ポリシーを予告なく変更することがあります。変更後の内容は、本ページに掲載した時点から効力を生じるものとします。"
          ]
        }
      ]
    };
  }
}
</script>
</body>
</html>
